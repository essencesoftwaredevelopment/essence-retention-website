<title>Globe</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #ffffff; }
  #scene { position: fixed; inset: 0; cursor: grab; }
  #scene.dragging { cursor: grabbing; }
  #panel {
    position: fixed; top: 16px; right: 16px; width: 232px;
    background: rgba(255,255,255,0.88); backdrop-filter: blur(8px);
    border: 1px solid #e8eaed; border-radius: 10px;
    padding: 14px 16px 10px;
    font: 11px/1.4 -apple-system, "SF Pro Text", "Segoe UI", sans-serif;
    color: #5f6368; user-select: none; z-index: 10;
  }
  #panel h2 {
    margin: 0 0 10px; font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: #9aa0a6;
    display: flex; justify-content: space-between; align-items: center;
  }
  #panel h2 button {
    border: none; background: none; color: #9aa0a6; cursor: pointer;
    font-size: 11px; padding: 0;
  }
  #panel.collapsed .row { display: none; }
  .row { margin-bottom: 8px; }
  .row label { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .row .val { color: #202124; font-variant-numeric: tabular-nums; }
  .row input[type=range] {
    -webkit-appearance: none; width: 100%; height: 2px;
    background: #dadce0; border-radius: 1px; outline: none; margin: 4px 0;
  }
  .row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
    background: #202124; cursor: pointer;
  }
  .row input[type=range]::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 50%;
    background: #202124; border: none; cursor: pointer;
  }
  body.embed #panel { display: none; }
  body.embed #scene { cursor: default; }
</style>
</head>

const container = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(32, window.innerWidth / window.innerHeight, 0.1, 100);
if (isEmbed) {
  camera.position.set(-0.7, 0.5, 9.4);
  camera.lookAt(0.25, -0.3, 0);
} else {
  camera.position.set(0, 0.45, 8.6);
  camera.lookAt(0, 0, 0);
}

// --- Lighting: flat and even by default; shape it with the sliders ---
const params = {
  ambient: 1.0,
  keyIntensity: 0.12,
  keyX: 0,        // degrees, horizontal angle of the key light
  keyY: 10,       // degrees, vertical angle of the key light
  fillIntensity: 0.0,
  bumpScale: 0.045,
  spinSpeed: 0.0016,
  arcOpacity: 0.85,
  arcGap: 1.0,
  arcWidth: isEmbed ? 0.004 : 0.011
};

const ambient = new THREE.AmbientLight(0xffffff, params.ambient);
scene.add(ambient);

const key = new THREE.DirectionalLight(0xffffff, params.keyIntensity);
scene.add(key);

const fill = new THREE.DirectionalLight(0xffffff, params.fillIntensity);
fill.position.set(4, -1, 3);
scene.add(fill);

function placeKey() {
  const ax = THREE.MathUtils.degToRad(params.keyX);
  const ay = THREE.MathUtils.degToRad(params.keyY);
  key.position.set(Math.sin(ax) * 6, Math.sin(ay) * 6, Math.cos(ax) * Math.cos(ay) * 6);
}
placeKey();

// --- Globe ---
const loader = new THREE.TextureLoader();
const mapTex = loader.load(COLOR_MAP);
mapTex.encoding = THREE.sRGBEncoding;
mapTex.anisotropy = renderer.capabilities.getMaxAnisotropy();
const bumpTex = loader.load(BUMP_MAP);

const material = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    map: mapTex,
    bumpMap: bumpTex,
    bumpScale: params.bumpScale,
    roughness: 1.0,
    metalness: 0.0
  });
const globe = new THREE.Mesh(new THREE.SphereGeometry(2, 128, 128), material);
globe.rotation.x = 0.12;          // slight tilt toward the viewer
globe.rotation.y = -0.4;          // start over the Atlantic, like the reference
scene.add(globe);

const R = 2;
function latLonToVec3(lat, lon) {
  const phi = THREE.MathUtils.degToRad(90 - lat);
  const theta = THREE.MathUtils.degToRad(lon + 180);
  return new THREE.Vector3(
    -R * Math.sin(phi) * Math.cos(theta),
     R * Math.cos(phi),
     R * Math.sin(phi) * Math.sin(theta)
  );
}

const SEGS = 80;
const RADIAL = 4;
const IDX_PER_SEG = RADIAL * 6;   // indices per tubular segment
const dotGeo = new THREE.SphereGeometry(0.024, 8, 8);

function makeArc() {
  const mat = new THREE.MeshBasicMaterial({
    color: LINE_COLOR, transparent: true, opacity: params.arcOpacity
  });
  const mesh = new THREE.Mesh(new THREE.BufferGeometry(), mat);
  mesh.frustumCulled = false;
  globe.add(mesh);

  const dotMat = new THREE.MeshBasicMaterial({ color: LINE_COLOR, transparent: true, opacity: 0 });
  const dotA = new THREE.Mesh(dotGeo, dotMat);
  const dotB = new THREE.Mesh(dotGeo, dotMat.clone());
  globe.add(dotA); globe.add(dotB);

  return { mesh, mat, dotA, dotB, t: 0, wait: Math.random() * 2.5, active: false };
}

function launchArc(arc) {
  let i = Math.floor(Math.random() * HUBS.length), j = i;
  while (j === i) j = Math.floor(Math.random() * HUBS.length);
  const a = latLonToVec3(...HUBS[i]);
  const b = latLonToVec3(...HUBS[j]);
  const lift = 0.15 + 0.45 * (a.distanceTo(b) / (2 * R));
  const mid = a.clone().add(b).normalize().multiplyScalar(R * (1 + lift));
  const curve = new THREE.QuadraticBezierCurve3(a, mid, b);
  arc.mesh.geometry.dispose();
  arc.mesh.geometry = new THREE.TubeGeometry(curve, SEGS, params.arcWidth, RADIAL, false);
  arc.mesh.geometry.setDrawRange(0, 0);
  arc.dotA.position.copy(a);
  arc.dotB.position.copy(b);
  arc.t = 0;
  arc.active = true;
}

const arcs = [];
for (let n = 0; n < 12; n++) arcs.push(makeArc());

function updateArcs(dt) {
  const DRAW = 1.4, HOLD = 0.5, ERASE = 1.2;
  const total = DRAW + HOLD + ERASE;
  for (const arc of arcs) {
    if (!arc.active) {
      arc.wait -= dt;
      if (arc.wait <= 0) launchArc(arc);
      continue;
    }
    arc.t += dt;
    const t = arc.t;
    let head = SEGS, tail = 0, dotAo = 0, dotBo = 0;
    if (t < DRAW) {                       // line shoots out from A
      const p = t / DRAW;
      head = Math.floor(SEGS * (p * p * (3 - 2 * p)));   // smoothstep
      dotAo = Math.min(1, t * 6);
      dotBo = 0;
    } else if (t < DRAW + HOLD) {         // fully connected
      dotAo = dotBo = 1;
    } else if (t < total) {               // tail catches up toward B
      const p = (t - DRAW - HOLD) / ERASE;
      tail = Math.floor(SEGS * (p * p * (3 - 2 * p)));
      dotAo = 1 - p;
      dotBo = 1 - p * 0.5;
    } else {                              // done; rest before next route
      arc.active = false;
      arc.wait = params.arcGap * (0.4 + Math.random() * 1.6);
      arc.mesh.geometry.setDrawRange(0, 0);
      arc.dotA.material.opacity = 0;
      arc.dotB.material.opacity = 0;
      continue;
    }
    arc.mesh.geometry.setDrawRange(tail * IDX_PER_SEG, Math.max(0, head - tail) * IDX_PER_SEG);
    arc.mat.opacity = params.arcOpacity;
    arc.dotA.material.opacity = dotAo * params.arcOpacity;
    arc.dotB.material.opacity = dotBo * params.arcOpacity;
  }
}

// --- Interaction: slow auto-spin, drag to rotate ---
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (reducedMotion) params.spinSpeed = 0;
let velocity = params.spinSpeed;
let dragging = false;
let lastX = 0;

container.addEventListener('pointerdown', e => {
  dragging = true;
  lastX = e.clientX;
  container.classList.add('dragging');
});
window.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  lastX = e.clientX;
  globe.rotation.y += dx * 0.005;
  velocity = dx * 0.0004;
});
window.addEventListener('pointerup', () => {
  dragging = false;
  container.classList.remove('dragging');
});

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (!reducedMotion) updateArcs(dt);
  if (!dragging) {
    globe.rotation.y += velocity;
    // ease back to the slow ambient spin after a fling
    velocity += (params.spinSpeed - velocity) * 0.02;
  }
  renderer.render(scene, camera);
}
animate();

// --- Control panel ---
const rows = document.getElementById('rows');
function slider(name, label, min, max, step, fmt, onChange) {
  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `<label>${label} <span class="val"></span></label>
    <input type="range" min="${min}" max="${max}" step="${step}" value="${params[name]}">`;
  const input = row.querySelector('input');
  const val = row.querySelector('.val');
  const render = v => { val.textContent = fmt ? fmt(v) : v; };
  render(params[name]);
  input.addEventListener('input', () => {
    params[name] = parseFloat(input.value);
    render(params[name]);
    onChange && onChange(params[name]);
  });
  rows.appendChild(row);
}

slider('ambient', 'Ambient light', 0, 1.5, 0.01, v => v.toFixed(2), v => ambient.intensity = v);
slider('keyIntensity', 'Key light', 0, 1, 0.01, v => v.toFixed(2), v => key.intensity = v);
slider('keyX', 'Key angle ←→', -80, 80, 1, v => v + '°', placeKey);
slider('keyY', 'Key angle ↑↓', -80, 80, 1, v => v + '°', placeKey);
slider('fillIntensity', 'Fill light', 0, 1, 0.01, v => v.toFixed(2), v => fill.intensity = v);
slider('bumpScale', 'Relief depth', 0, 0.15, 0.001, v => v.toFixed(3), v => material.bumpScale = v);
slider('spinSpeed', 'Spin speed', 0, 0.01, 0.0001, v => (v * 1000).toFixed(1), () => {});
slider('arcOpacity', 'Line opacity', 0, 1, 0.01, v => v.toFixed(2), () => {});
slider('arcGap', 'Line frequency', 0.2, 8, 0.1, v => v.toFixed(1) + 's', () => {});
slider('arcWidth', 'Line width', 0.0005, 0.03, 0.0005, v => v.toFixed(4), () => {});

const panel = document.getElementById('panel');
document.getElementById('toggle').addEventListener('click', () => {
  panel.classList.toggle('collapsed');
  document.getElementById('toggle').textContent =
    panel.classList.contains('collapsed') ? 'show' : 'hide';
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
